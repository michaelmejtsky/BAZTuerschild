<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    /* 🔥 EXTRA FIX gegen PlaySignage Balken */
    #wrapper {
      position: fixed;
      top: -5px;
      left: -5px;
      width: calc(100vw + 10px);
      height: calc(100vh + 10px);
      overflow: hidden;
    }

    #schild {
      width: 100%;
      height: 100%;
      object-fit: fill; /* 👉 füllt ALLES */
      display: none;
    }

    #fallback {
      position: fixed;
      inset: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 3vw;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
  </style>
</head>

<body>

  <div id="wrapper">
    <img id="schild" alt="Türschild">
  </div>

  <div id="fallback">Türschild wird geladen...</div>

  <script>
    const fileId = "1DEVPnBgUSTi3_LvctYcAG-PRyywNvAcQ";

    const img = document.getElementById("schild");
    const fallback = document.getElementById("fallback");

    const urls = [
      "https://lh3.googleusercontent.com/d/" + fileId,
      "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w3000",
      "https://drive.google.com/uc?export=view&id=" + fileId
    ];

    let index = 0;

    function loadImage() {
      index = 0;
      tryLoad();
    }

    function tryLoad() {
      const base = urls[index];
      const url = base + (base.includes("?") ? "&" : "?") + "t=" + Date.now();

      img.onload = function () {
        img.style.display = "block";
        fallback.style.display = "none";
      };

      img.onerror = function () {
        index++;
        if (index < urls.length) {
          tryLoad();
        } else {
          img.style.display = "none";
          fallback.style.display = "flex";
          fallback.innerHTML = "Kein Türschild verfügbar<br><br>Drive prüfen";
        }
      };

      img.src = url;
    }

    loadImage();

    // 🔄 alle 10 Sekunden neu laden
    setInterval(loadImage, 10000);
  </script>

</body>
</html>
