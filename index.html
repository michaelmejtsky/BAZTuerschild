<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #schild {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      display: none;
    }

    #fallback {
      position: fixed;
      inset: 0;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 40px;
      font-size: 2.5vw;
    }

    #wappen {
      position: fixed;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: 180px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

<img id="schild">
<div id="fallback">Türschild wird geladen...</div>

<!-- 👉 DEIN WAPPEN -->
<img id="wappen" src="https://lh3.googleusercontent.com/d/1sRhX6ARI0fulpRUnoVScMUb3QL3B2ivO">

<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7iycjDS2MtYA1sTFPiqHs2XV3G0JBlKUxfysi2UBZoVaKuNJGMM7gOAnFexj7Bssq/exec";

  var img = document.getElementById("schild");
  var fallback = document.getElementById("fallback");

  var lastUpdatedTs = 0;
  var lastGoodUrl = "";

  // 🔥 TESTMODUS über URL
  var testErrorMode = window.location.search.indexOf("testfehler=1") !== -1;

 function showLoadingMessage() {
  img.style.display = "none";

  fallback.innerHTML =
    "Derzeit gibt es Verbindungsschwierigkeiten<br>" +
    "Wir arbeiten an der Problembehebung<br><br>" +
    "Bitte läuten Sie einfach an";

  fallback.style.display = "flex";
}

function showFinalError() {
  img.style.display = "none";

  fallback.innerHTML =
    "Verbindungsfehler<br><br>" +
    "Bitte läuten Sie einfach an";

  fallback.style.display = "flex";
}

  function loadMeta() {

    // 🧪 Testmodus
    if (testErrorMode) {
      showLoadingMessage();
      setTimeout(showFinalError, 4000);
      return;
    }

    var cb = "cb_" + new Date().getTime();
    var done = false;

    window[cb] = function(data) {
      done = true;

      try {
        if (!data || !data.ok || !data.url) {
          showLoadingMessage();
          setTimeout(showFinalError, 4000);
          return;
        }

        if (Number(data.updatedTs) !== lastUpdatedTs || data.url !== lastGoodUrl) {
          lastUpdatedTs = Number(data.updatedTs);
          loadImage(data.url);
        }

      } catch (e) {
        showLoadingMessage();
        setTimeout(showFinalError, 4000);
      }

      try { delete window[cb]; } catch(e){}
    };

    var s = document.createElement("script");
    s.src = SCRIPT_URL + "?meta=1&callback=" + cb + "&t=" + new Date().getTime();
    document.body.appendChild(s);

    setTimeout(function() {
      if (!done) {
        showLoadingMessage();
        setTimeout(showFinalError, 4000);
      }

      if (s.parentNode) s.parentNode.removeChild(s);
    }, 10000);
  }

  function loadImage(url) {
    var real = url + (url.indexOf("?") >= 0 ? "&" : "?") + "reload=" + new Date().getTime();

    var test = new Image();

    test.onload = function() {
      lastGoodUrl = url;
      img.src = real;
      img.style.display = "block";
      fallback.style.display = "none";
    };

    test.onerror = function() {
      showLoadingMessage();
      setTimeout(showFinalError, 4000);
    };

    test.src = real;
  }

  loadMeta();
  setInterval(loadMeta, 10000);
</script>

</body>
</html>
