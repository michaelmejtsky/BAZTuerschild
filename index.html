<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    #fallback {
      position: fixed;
      inset: 0;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 3vw;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #000;
    }
  </style>
</head>

<body>
  <div id="screen"></div>
  <div id="fallback">Kein Türschild verfügbar<br><br>Drive prüfen</div>

  <script>
    const fileId = "1DEVPnBgUSTi3_LvctYcAG-PRyywNvAcQ";

    const screen = document.getElementById("screen");
    const fallback = document.getElementById("fallback");

    const urls = [
      "https://lh3.googleusercontent.com/d/" + fileId,
      "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w3000",
      "https://drive.google.com/uc?export=view&id=" + fileId
    ];

    let currentUrlIndex = 0;

    function loadImage() {
      currentUrlIndex = 0;
      tryLoad();
    }

    function tryLoad() {
      const testImg = new Image();
      const baseUrl = urls[currentUrlIndex];
      const url = baseUrl + (baseUrl.includes("?") ? "&" : "?") + "t=" + Date.now();

      testImg.onload = function() {
        screen.style.backgroundImage = 'url("' + url + '")';
        screen.style.display = "block";
        fallback.style.display = "none";
      };

      testImg.onerror = function() {
        currentUrlIndex++;

        if (currentUrlIndex < urls.length) {
          tryLoad();
        } else {
          screen.style.display = "none";
          fallback.style.display = "flex";
        }
      };

      testImg.src = url;
    }

    loadImage();
    setInterval(loadImage, 10000);
  </script>
</body>
</html>
