<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #schild {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
      border: 0;
    }

    #fallback {
      color: white;
      font-family: Arial, sans-serif;
      font-size: 3vw;
      text-align: center;
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: #000;
    }
  </style>
</head>

<body>
  <img id="schild" src="" alt="Türschild">
  <div id="fallback">Kein Türschild verfügbar</div>

  <script>
    const img = document.getElementById('schild');
    const fallback = document.getElementById('fallback');

    // Drive Direktlink
    const baseUrl = "https://drive.google.com/uc?export=view&id=1DEVPnBgUSTi3_LvctYcAG-PRyywNvAcQ";

    function loadImage() {
      img.src = baseUrl + "&t=" + Date.now();
    }

    img.onerror = function () {
      img.style.display = "none";
      fallback.style.display = "flex";
    };

    img.onload = function () {
      img.style.display = "block";
      fallback.style.display = "none";
    };

    loadImage();
    setInterval(loadImage, 10000);
  </script>
</body>
</html>
