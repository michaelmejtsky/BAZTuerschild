<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    html, body {
      margin:0;
      padding:0;
      width:100vw;
      height:100vh;
      background:black;
      overflow:hidden;
      font-family:Arial;
    }

    #schild {
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      object-fit:fill;
      display:none;
    }

    #fallback {
      position:fixed;
      inset:0;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:30px;
      font-size:3vw;
      flex-direction:column;
    }

    #debug {
      position:fixed;
      bottom:10px;
      left:10px;
      color:#0f0;
      font-size:12px;
      opacity:0.7;
    }
  </style>
</head>

<body>

<img id="schild">
<div id="fallback">Lade Türschild...</div>
<div id="debug">Start...</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7iycjDS2MtYA1sTFPiqHs2XV3G0JBlKUxfysi2UBZoVaKuNJGMM7gOAnFexj7Bssq/exec";

var img = document.getElementById("schild");
var fallback = document.getElementById("fallback");
var debug = document.getElementById("debug");

var lastUpdated = 0;

function log(msg){
  debug.innerHTML = msg;
  console.log(msg);
}

function showError(text){
  fallback.innerHTML = text;
  fallback.style.display = "flex";
}

function loadMeta(){
  var cb = "cb_" + Date.now();
  var done = false;

  log("Lade Apps Script...");

  window[cb] = function(data){
    done = true;

    log("Antwort erhalten");

    if(!data || !data.ok){
      showError("Apps Script Fehler");
      return;
    }

    if(!data.url){
      showError("Kein Bildlink");
      return;
    }

    log("Bild wird geladen...");

    loadImage(data.url);
  };

  var s = document.createElement("script");
  s.src = SCRIPT_URL + "?meta=1&callback=" + cb + "&t=" + Date.now();

  s.onerror = function(){
    log("Script Fehler");
    showError("Verbindung Apps Script fehlgeschlagen");
  };

  document.body.appendChild(s);

  setTimeout(function(){
    if(!done){
      log("Timeout");
      showError("Timeout bei Apps Script");
    }
  },10000);
}

function loadImage(url){
  var real = url + "&r=" + Date.now();

  var test = new Image();

  test.onload = function(){
    log("Bild OK");

    img.src = real;
    img.style.display = "block";
    fallback.style.display = "none";
  };

  test.onerror = function(){
    log("Bild Fehler");
    showError("Bild konnte nicht geladen werden");
  };

  test.src = real;
}

loadMeta();
</script>

</body>
</html>
