<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #schild {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: fill;
      display: none;
      border: 0;
    }

    #fallback {
      position: fixed;
      inset: 0;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 40px;
      font-size: 2.5vw;
    }

    #wappen {
      position: fixed;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

<img id="schild">
<div id="fallback"></div>

<!-- 👉 HIER DEIN WAPPEN LINK EINTRAGEN -->
<img id="wappen" src="https://lh3.googleusercontent.com/d/1sRhX6ARI0fulpRUnoVScMUb3QL3B2ivO">

<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7iycjDS2MtYA1sTFPiqHs2XV3G0JBlKUxfysi2UBZoVaKuNJGMM7gOAnFexj7Bssq/exec";

  var img = document.getElementById("schild");
  var fallback = document.getElementById("fallback");

  var lastUpdatedTs = 0;
  var lastGoodUrl = "";

  var testErrorMode = false; // 🧪 TEST EIN/AUS

  function showLoadingMessage() {
    fallback.innerHTML = "Derzeit gibt es Verbindungsschwierigkeiten<br>" +
                         "Wir arbeiten an der Problembehebung<br><br>" +
                         "Bitte läuten Sie einfach an";
    fallback.style.display = "flex";
  }

  function showFinalError() {
    fallback.innerHTML = "Fehler beim Laden<br><br>Bitte manuell läuten";
    fallback.style.display = "flex";
  }

  function loadMeta() {
    if (testErrorMode) {
      showLoadingMessage();
      setTimeout(showFinalError, 4000);
      return;
    }

    var cb = "cb_" + new Date().getTime();
    var done = false;

    window[cb] = function(data) {
      done = true;

      try {
        if (!data || !data.ok || !data.url) {
          showLoadingMessage();
          setTimeout(showFinalError, 4000);
          return;
        }

        if (Number(data.updatedTs) !== lastUpdatedTs || data.url !== lastGoodUrl) {
          lastUpdatedTs = Number(data.updatedTs);
          loadImage(data.url);
        }

      } catch (e) {
        showLoadingMessage();
        setTimeout(showFinalError, 4000);
      }

      try { delete window[cb]; } catch (e) {}
    };

    var s = document.createElement("script");
    s.src = SCRIPT_URL + "?meta=1&callback=" + cb + "&t=" + new Date().getTime();
    document.body.appendChild(s);

    setTimeout(function() {
      if (!done) {
        showLoadingMessage();
        setTimeout(showFinalError, 4000);
      }

      if (s.parentNode) s.parentNode.removeChild(s);
    }, 10000);
  }

  function loadImage(url) {
    var realUrl = url + (url.indexOf("?") >= 0 ? "&" : "?") + "reload=" + new Date().getTime();
    var test = new Image();

    test.onload = function() {
      lastGoodUrl = url;
      img.src = realUrl;
      img.style.display = "block";
      fallback.style.display = "none";
    };

    test.onerror = function() {
      showLoadingMessage();
      setTimeout(showFinalError, 4000);
    };

    test.src = realUrl;
  }

  loadMeta();
  setInterval(loadMeta, 10000);
</script>

</body>
</html>
