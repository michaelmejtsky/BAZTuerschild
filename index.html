<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    #fallback {
      color: white;
      font-size: 3vw;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>
  <div id="container">
    <img id="schild" src="" alt="Türschild">
    <div id="fallback">Kein Türschild verfügbar</div>
  </div>

  <script>
    const img = document.getElementById('schild');
    const fallback = document.getElementById('fallback');

    // 👉 DEINE Cloudinary URL (fix)
    const baseUrl = "https://res.cloudinary.com/dkyx7nz70/image/upload/tuerschild/dienst.png";

    function loadImage() {
      const url = baseUrl + "?t=" + Date.now(); // Cache umgehen
      img.src = url;
    }

    // Fehler abfangen
    img.onerror = function () {
      img.style.display = "none";
      fallback.style.display = "block";
    };

    img.onload = function () {
      img.style.display = "block";
      fallback.style.display = "none";
    };

    // Initial laden
    loadImage();

    // 🔄 Alle 10 Sekunden neu laden
    setInterval(loadImage, 10000);
  </script>
</body>
</html>
