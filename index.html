<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #schild {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* 👉 füllt ganzen Bildschirm */
      display: block;
    }

    #fallback {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 3vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <img id="schild" src="" alt="Türschild">
  <div id="fallback">Kein Türschild verfügbar</div>

  <script>
    const img = document.getElementById('schild');
    const fallback = document.getElementById('fallback');

    // 👉 DEIN Drive Bild (funktionierend als Bild)
    const baseUrl = "https://drive.google.com/thumbnail?id=1DEVPnBgUSTi3_LvctYcAG-PRyywNvAcQ&sz=w2000";

    function loadImage() {
      img.src = baseUrl + "&cache=" + Date.now(); // Cache umgehen
    }

    img.onload = function () {
      img.style.display = "block";
      fallback.style.display = "none";
    };

    img.onerror = function () {
      img.style.display = "none";
      fallback.style.display = "flex";
    };

    // Initial laden
    loadImage();

    // 🔄 alle 10 Sekunden aktualisieren
    setInterval(loadImage, 10000);
  </script>
</body>
</html>
