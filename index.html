<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #schild {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }

    #fallback {
      position: fixed;
      inset: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 3vw;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
  </style>
</head>

<body>
  <img id="schild" alt="Türschild">
  <div id="fallback">Türschild wird geladen...</div>

  <script>
    const fileId = "1DEVPnBgUSTi3_LvctYcAG-PRyywNvAcQ";

    const img = document.getElementById("schild");
    const fallback = document.getElementById("fallback");

    const urls = [
      "https://lh3.googleusercontent.com/d/" + fileId,
      "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w3000",
      "https://drive.google.com/uc?export=view&id=" + fileId
    ];

    let urlIndex = 0;

    function loadImage() {
      urlIndex = 0;
      tryUrl();
    }

    function tryUrl() {
      const url = urls[urlIndex] + (urls[urlIndex].includes("?") ? "&" : "?") + "t=" + Date.now();
      img.src = url;
    }

    img.onload = function () {
      adjustImage();
      img.style.display = "block";
      fallback.style.display = "none";
    };

    img.onerror = function () {
      urlIndex++;
      if (urlIndex < urls.length) {
        tryUrl();
      } else {
        img.style.display = "none";
        fallback.style.display = "flex";
        fallback.innerHTML = "Kein Türschild verfügbar<br><br>Drive prüfen";
      }
    };

    function adjustImage() {
      const screenRatio = window.innerWidth / window.innerHeight;
      const imageRatio = img.naturalWidth / img.naturalHeight;

      if (imageRatio > screenRatio) {
        // Bild ist breiter → Höhe anpassen
        img.style.height = "100vh";
        img.style.width = "auto";
      } else {
        // Bild ist höher → Breite anpassen
        img.style.width = "100vw";
        img.style.height = "auto";
      }
    }

    window.onresize = adjustImage;

    loadImage();
    setInterval(loadImage, 10000);
  </script>
</body>
</html>
