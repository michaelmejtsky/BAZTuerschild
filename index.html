<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BAZ Türschild</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#schild {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:fill;
  display:block;
  z-index:1;
}

#meldung {
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
  font-size:2.4vw;
  padding:40px;
  z-index:10;
}

#meldungText {
  max-width:65%;
  line-height:1.35;
}

#wappen {
  position:fixed;
  right:6%;
  top:50%;
  transform:translateY(-50%);
  width:190px;
  max-width:18vw;
  z-index:20;
  opacity:0.95;
}

#debugPanel {
  position:fixed;
  left:14px;
  bottom:14px;
  z-index:99999;
  display:none;
  max-width:560px;
  background:rgba(0,0,0,.78);
  color:#00eaff;
  border:1px solid rgba(0,234,255,.55);
  border-radius:12px;
  padding:12px 14px;
  font-size:13px;
  line-height:1.45;
  text-align:left;
  font-family:Consolas, monospace;
  word-break:break-all;
}
</style>
</head>

<body>

<img id="schild" alt="BAZ Türschild">

<div id="meldung">
  <div id="meldungText">
    Derzeit gibt es Verbindungsschwierigkeiten.<br>
    Wir arbeiten an der Problembehebung.<br><br>
    Bitte läuten Sie einfach an.
  </div>
  <img id="wappen" src="https://lh3.googleusercontent.com/d/1sRhX6ARI0fulpRUnoVScMUb3QL3B2ivO" alt="Wappen">
</div>

<div id="debugPanel">Statusdiagnose wird geladen …</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7iycjDS2MtYA1sTFPiqHs2XV3G0JBlKUxfysi2UBZoVaKuNJGMM7gOAnFexj7Bssq/exec";
var GLOBAL_STATUS_URL = "https://michaelmejtsky.github.io/FFSTP-Status/status.json";

var img = document.getElementById("schild");
var meldung = document.getElementById("meldung");
var debugPanel = document.getElementById("debugPanel");

var currentUrl = "";
var lastSuccess = Date.now();

var globalFallbackActive = false;
var localFallbackActive = false;
var debugMode = false;

function showFallback() {
  meldung.style.display = "flex";
}

function hideFallback() {
  if (globalFallbackActive || localFallbackActive) return;
  meldung.style.display = "none";
}

function setDebug(text) {
  if (!debugMode) return;
  debugPanel.style.display = "block";
  debugPanel.innerHTML = text;
}

function update() {
  if (globalFallbackActive) {
    showFallback();
    return;
  }

  var cb = "cb_" + Date.now();
  var responded = false;
  var script;

  window[cb] = function(data) {
    responded = true;

    if (data && data.ok && data.url) {
      lastSuccess = Date.now();
      localFallbackActive = false;
      hideFallback();

      if (data.url !== currentUrl) {
        currentUrl = data.url;
        img.src = currentUrl + (currentUrl.indexOf("?") >= 0 ? "&" : "?") + "r=" + Date.now();
      }
    } else {
      checkFallback();
    }

    try { delete window[cb]; } catch(e) {}
    if (script && script.parentNode) script.parentNode.removeChild(script);
  };

  script = document.createElement("script");
  script.src = SCRIPT_URL + "?meta=1&callback=" + cb + "&t=" + Date.now();
  document.body.appendChild(script);

  setTimeout(function() {
    if (!responded) {
      checkFallback();
    }
    if (script && script.parentNode) script.parentNode.removeChild(script);
  }, 8000);
}

function checkFallback() {
  var diff = Date.now() - lastSuccess;

  if (!currentUrl || diff > 10000) {
    localFallbackActive = true;
    showFallback();
  }
}

img.onerror = function() {
  localFallbackActive = true;
  showFallback();
};

async function checkGlobalFallbackStatus() {
  var url = GLOBAL_STATUS_URL + "?nocache=" + Date.now();

  try {
    setDebug("Prüfe Status…<br>URL: " + url);

    var response = await fetch(url, {
      cache: "no-store"
    });

    var text = await response.text();
    var lower = text.toLowerCase();

    var fallbackIsTrue = lower.includes("fallback") && lower.includes("true");

    setDebug(
      "HTTP: " + response.status + "<br>" +
      "fallback erkannt: " + fallbackIsTrue + "<br>" +
      "globalFallbackActive: " + globalFallbackActive + "<br>" +
      "localFallbackActive: " + localFallbackActive + "<br>" +
      "Antwort:<br>" + text.replace(/</g, "&lt;").replace(/>/g, "&gt;")
    );

    if (fallbackIsTrue) {
      globalFallbackActive = true;
      showFallback();
    } else {
      globalFallbackActive = false;
      hideFallback();
    }

  } catch (err) {
    setDebug("Fetch Fehler:<br>" + String(err));
    console.log("Globaler Status konnte nicht geprüft werden:", err);
  }
}

var params = new URLSearchParams(window.location.search);

if (params.has("debug") || params.get("debug") === "1") {
  debugMode = true;
  debugPanel.style.display = "block";
}

if (
  params.has("offline") ||
  params.has("testoffline") ||
  params.get("test") === "offline"
) {
  globalFallbackActive = true;
  showFallback();
}

update();
checkGlobalFallbackStatus();

setInterval(update, 30000);
setInterval(checkGlobalFallbackStatus, 10000);
</script>

</body>
</html>
