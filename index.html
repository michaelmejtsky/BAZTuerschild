<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAZ Türschild</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    #wrapper {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    #schild {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: none;
      border: 0;
    }

    #fallback {
      position: fixed;
      inset: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 3vw;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }
  </style>
</head>

<body>

  <div id="wrapper">
    <img id="schild" alt="Türschild">
  </div>

  <div id="fallback">Türschild wird geladen...</div>

  <script>
    const scriptBaseUrl = "https://script.google.com/macros/s/AKfycbx7iycjDS2MtYA1sTFPiqHs2XV3G0JBlKUxfysi2UBZoVaKuNJGMM7gOAnFexj7Bssq/exec";

    const img = document.getElementById("schild");
    const fallback = document.getElementById("fallback");

    let lastUpdatedTs = 0;

    function loadMeta() {
      const oldScript = document.getElementById("jsonpScript");
      if (oldScript) oldScript.remove();

      const s = document.createElement("script");
      s.id = "jsonpScript";
      s.src = scriptBaseUrl + "?callback=updateDoorSign&cache=" + Date.now();
      document.body.appendChild(s);
    }

    function updateDoorSign(data) {
      if (!data || !data.ok || !data.url) {
        showFallback("Kein Türschild verfügbar<br><br>Apps Script liefert keinen Bildlink");
        return;
      }

      if (Number(data.updatedTs) !== lastUpdatedTs) {
        lastUpdatedTs = Number(data.updatedTs);
        loadImage(data.url);
      }
    }

    function loadImage(url) {
      const testImg = new Image();

      const finalUrl = url + (url.includes("?") ? "&" : "?") + "reload=" + Date.now();

      testImg.onload = function () {
        img.src = finalUrl;
        img.style.display = "block";
        fallback.style.display = "none";
      };

      testImg.onerror = function () {
        showFallback("Bild konnte nicht geladen werden<br><br>Drive-Freigabe prüfen");
      };

      testImg.src = finalUrl;
    }

    function showFallback(text) {
      img.style.display = "none";
      fallback.style.display = "flex";
      fallback.innerHTML = text;
    }

    loadMeta();

    // alle 10 Sekunden prüfen
    setInterval(loadMeta, 10000);
  </script>

</body>
</html>
