<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BAZ Türschild</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100vw;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#schild {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:fill;
  display:block;
  z-index:1;
}

#meldung {
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
  font-size:2.4vw;
  padding:40px;
  z-index:10;
}

#meldungText {
  max-width:65%;
  line-height:1.35;
}

#wappen {
  position:fixed;
  right:6%;
  top:50%;
  transform:translateY(-50%);
  width:190px;
  max-width:18vw;
  z-index:20;
  opacity:0.95;
}
</style>
</head>

<body>

<img id="schild" alt="BAZ Türschild">

<div id="meldung">
  <div id="meldungText">
    Derzeit gibt es Verbindungsschwierigkeiten.<br>
    Wir arbeiten an der Problembehebung.<br><br>
    Bitte läuten Sie einfach an.
  </div>
  <img id="wappen" src="https://lh3.googleusercontent.com/d/1sRhX6ARI0fulpRUnoVScMUb3QL3B2ivO" alt="Wappen">
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7iycjDS2MtYA1sTFPiqHs2XV3G0JBlKUxfysi2UBZoVaKuNJGMM7gOAnFexj7Bssq/exec";

var img = document.getElementById("schild");
var meldung = document.getElementById("meldung");

var currentUrl = "";
var lastSuccess = Date.now();

function update() {
  var cb = "cb_" + Date.now();
  var responded = false;

  window[cb] = function(data) {
    responded = true;

    if (data && data.ok && data.url) {
      lastSuccess = Date.now();
      meldung.style.display = "none";

      if (data.url !== currentUrl) {
        currentUrl = data.url;
        img.src = currentUrl + (currentUrl.indexOf("?") >= 0 ? "&" : "?") + "r=" + Date.now();
      }
    } else {
      checkFallback();
    }

    try { delete window[cb]; } catch(e) {}
    if (script && script.parentNode) script.parentNode.removeChild(script);
  };

  var script = document.createElement("script");
  script.src = SCRIPT_URL + "?meta=1&callback=" + cb + "&t=" + Date.now();
  document.body.appendChild(script);

  setTimeout(function() {
    if (!responded) {
      checkFallback();
    }
    if (script && script.parentNode) script.parentNode.removeChild(script);
  }, 8000);
}

function checkFallback() {
  var diff = Date.now() - lastSuccess;

  if (!currentUrl || diff > 10000) {
    meldung.style.display = "flex";
  }
}

img.onerror = function() {
  checkFallback();
};

update();
setInterval(update, 5000);
</script>

</body>
</html>
